name: CI

on:
  push:
  pull_request:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 22+ for native WebSocket (required by @supabase/supabase-js realtime).
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (scoring engine)
        run: npm test

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Reset DB (re-apply migrations cleanly)
        run: supabase db reset

      - name: Export DB connection
        run: |
          status=$(supabase status --output env)
          db_url=$(echo "$status" | grep '^DB_URL=' | cut -d= -f2- | tr -d '"')
          echo "DATABASE_URL=$db_url" >> "$GITHUB_ENV"

      - name: Seed
        run: npm run seed

      - name: Verify 21/24 anchor end-to-end
        run: npm run verify

      - name: Stop Supabase
        if: always()
        run: supabase stop
